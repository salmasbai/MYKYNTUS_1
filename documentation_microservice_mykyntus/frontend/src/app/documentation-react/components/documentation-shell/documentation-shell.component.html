<div class="min-h-screen bg-navy-950 flex transition-colors duration-300">
  <app-documentation-sidebar></app-documentation-sidebar>
  <main
    class="flex-1 transition-all duration-300 min-h-screen flex flex-col"
    [ngClass]="(nav.sidebarCollapsed$ | async) ? 'ml-[70px]' : 'ml-64'"
  >
    <app-documentation-header [title]="(title$ | async) ?? ''"></app-documentation-header>
    <div class="p-8 flex-1">
      <router-outlet></router-outlet>
    </div>
    <footer class="p-8 border-t border-navy-800 text-center transition-colors duration-300">
      <p class="text-xs text-slate-600">
        © 2024 MyKyntus — Plateforme RH entreprise. Tous droits réservés.
      </p>
    </footer>
  </main>
</div>
