@if (enabled) {
  <div
    class="flex flex-wrap items-center gap-x-4 gap-y-2 px-4 py-2 border-b border-amber-500/25 bg-amber-950/50 text-amber-100/95 text-xs sm:text-sm"
    role="region"
    aria-label="Sélecteur de contexte développeur — organisation et hiérarchie métier"
  >
    <span class="font-semibold text-amber-200 shrink-0">Mode développeur</span>

    <label class="flex items-center gap-2 min-w-0 flex-1">
      <span class="text-amber-200/90 shrink-0">Pôle</span>
      <select
        class="bg-navy-900 border border-amber-500/30 rounded px-2 py-1 text-white min-w-0 flex-1 max-w-[14rem]"
        [(ngModel)]="selectedPoleId"
        (ngModelChange)="onPoleChange($event)"
      >
        @for (p of poles; track p.id) {
          <option [ngValue]="p.id">{{ p.name }} ({{ p.code }})</option>
        }
      </select>
    </label>
    <label class="flex items-center gap-2 min-w-0 flex-1">
      <span class="text-amber-200/90 shrink-0">Cellule</span>
      <select
        class="bg-navy-900 border border-amber-500/30 rounded px-2 py-1 text-white min-w-0 flex-1 max-w-[14rem]"
        [(ngModel)]="selectedCelluleId"
        (ngModelChange)="onCelluleChange($event)"
        [disabled]="!selectedPoleId"
      >
        @for (c of cellules; track c.id) {
          <option [ngValue]="c.id">{{ c.name }} ({{ c.code }})</option>
        }
      </select>
    </label>
    <label class="flex items-center gap-2 min-w-0 flex-1">
      <span class="text-amber-200/90 shrink-0">Département</span>
      <select
        class="bg-navy-900 border border-amber-500/30 rounded px-2 py-1 text-white min-w-0 flex-1 max-w-[14rem]"
        [(ngModel)]="selectedDepartementId"
        (ngModelChange)="onDepartementChange($event)"
        [disabled]="!selectedCelluleId"
      >
        @for (d of departements; track d.id) {
          <option [ngValue]="d.id">{{ d.name }} ({{ d.code }})</option>
        }
      </select>
    </label>

    <label class="flex items-center gap-2">
      <span class="text-amber-200/90 shrink-0">Rôle</span>
      <select
        class="bg-navy-900 border border-amber-500/30 rounded px-2 py-1 text-white max-w-[10rem]"
        [(ngModel)]="selectedRole"
        (ngModelChange)="onRoleChange($event)"
        [disabled]="!orgSelectionComplete()"
      >
        @for (r of roleOptions; track r) {
          <option [ngValue]="r">{{ r }}</option>
        }
      </select>
    </label>

    @if (selectedRole === 'Manager') {
      <label class="flex items-center gap-2 min-w-0 flex-1">
        <span class="text-amber-200/90 shrink-0">Manager</span>
        <select
          class="bg-navy-900 border border-amber-500/30 rounded px-2 py-1 text-white min-w-0 flex-1 max-w-md"
          [(ngModel)]="selectedManagerUserId"
          (ngModelChange)="onManagerIdentityChange($event)"
          [disabled]="!orgSelectionComplete()"
        >
          @for (m of managersForDept; track m.id) {
            <option [ngValue]="m.id">{{ m.prenom }} {{ m.nom }} — {{ m.email }}</option>
          }
        </select>
      </label>
      <label class="flex items-center gap-2 min-w-0 flex-1">
        <span class="text-amber-200/90 shrink-0">Coach (périmètre)</span>
        <select
          class="bg-navy-900 border border-amber-500/30 rounded px-2 py-1 text-white min-w-0 flex-1 max-w-md"
          [(ngModel)]="selectedCoachScopeId"
          (ngModelChange)="onCoachScopeChange($event)"
          [disabled]="!orgSelectionComplete() || !selectedManagerUserId"
        >
          @for (c of coachesForManager; track c.id) {
            <option [ngValue]="c.id">{{ c.prenom }} {{ c.nom }} — {{ c.email }}</option>
          }
        </select>
      </label>
    } @else if (selectedRole === 'RP') {
      <label class="flex items-center gap-2 min-w-0 flex-1">
        <span class="text-amber-200/90 shrink-0">Manager</span>
        <select
          class="bg-navy-900 border border-amber-500/30 rounded px-2 py-1 text-white min-w-0 flex-1 max-w-md"
          [(ngModel)]="selectedRpScopeManagerId"
          (ngModelChange)="onRpManagerChange($event)"
          [disabled]="!orgSelectionComplete()"
        >
          @for (m of managersForDept; track m.id) {
            <option [ngValue]="m.id">{{ m.prenom }} {{ m.nom }}</option>
          }
        </select>
      </label>
      <label class="flex items-center gap-2 min-w-0 flex-1">
        <span class="text-amber-200/90 shrink-0">Coach</span>
        <select
          class="bg-navy-900 border border-amber-500/30 rounded px-2 py-1 text-white min-w-0 flex-1 max-w-md"
          [(ngModel)]="selectedRpScopeCoachId"
          (ngModelChange)="onRpCoachChange($event)"
          [disabled]="!orgSelectionComplete() || !selectedRpScopeManagerId"
        >
          @for (c of coachesForManager; track c.id) {
            <option [ngValue]="c.id">{{ c.prenom }} {{ c.nom }}</option>
          }
        </select>
      </label>
      <label class="flex items-center gap-2 min-w-0 flex-1">
        <span class="text-amber-200/90 shrink-0">RP (identité)</span>
        <select
          class="bg-navy-900 border border-amber-500/30 rounded px-2 py-1 text-white min-w-0 flex-1 max-w-md"
          [(ngModel)]="selectedRpUserId"
          (ngModelChange)="onRpUserChange($event)"
          [disabled]="!orgSelectionComplete()"
        >
          @for (u of rpUsersForDept; track u.id) {
            <option [ngValue]="u.id">{{ u.prenom }} {{ u.nom }} — {{ u.email }}</option>
          }
        </select>
      </label>
    } @else {
      <label class="flex items-center gap-2 min-w-0 flex-1">
        <span class="text-amber-200/90 shrink-0">Utilisateur</span>
        <select
          class="bg-navy-900 border border-amber-500/30 rounded px-2 py-1 text-white min-w-0 flex-1 max-w-md"
          [(ngModel)]="selectedUserId"
          (ngModelChange)="onUserChange($event)"
          [disabled]="!orgSelectionComplete()"
        >
          @for (u of scopedUsersForRole; track u.id) {
            <option [ngValue]="u.id">{{ u.prenom }} {{ u.nom }} — {{ u.email }}</option>
          }
        </select>
      </label>
    }

    @if (orgLoadHint) {
      <span
        class="text-rose-200/95 text-[11px] max-w-md shrink-0 border border-rose-500/30 rounded px-2 py-1 bg-rose-950/40"
        role="status"
      >
        {{ orgLoadHint }}
      </span>
    }

    <span class="text-amber-100/80 truncate max-w-full sm:max-w-xl" title="Contexte courant">
      Connecté en tant que : <strong>{{ displayLine() }}</strong> ·
      <code class="text-[10px] opacity-80">{{ headers.tenantId }}</code>
      = {{ currentTenantId() }}
    </span>
  </div>
}
