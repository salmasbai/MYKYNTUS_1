@if (role$ | async; as role) {
  <div class="space-y-6">
    <div class="flex items-center justify-between">
      <div>
        <h3 class="text-xl font-bold text-white">Document Generation</h3>
        <p class="text-sm text-slate-500">Manually generate documents for employees</p>
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
      <div class="card-navy p-6 space-y-6">
        <h4 class="text-sm font-bold text-white uppercase tracking-wider">Generation Form</h4>
        <div class="space-y-4">
          <div class="space-y-2">
            <label class="text-xs font-medium text-slate-400">Select Employee</label>
            <select
              class="w-full bg-navy-800 border border-navy-700 rounded-lg p-2.5 text-sm text-slate-200 outline-none focus:border-blue-500"
            >
              <option>Alice Johnson (Engineering)</option>
              <option>Bob Smith (Sales)</option>
              <option>Charlie Brown (HR)</option>
            </select>
          </div>
          <div class="space-y-2">
            <label class="text-xs font-medium text-slate-400">Select Template</label>
            <select
              class="w-full bg-navy-800 border border-navy-700 rounded-lg p-2.5 text-sm text-slate-200 outline-none focus:border-blue-500"
            >
              <option>Standard Work Certificate</option>
              <option>Salary Certificate (English)</option>
              <option>Employment Contract V2</option>
            </select>
          </div>
          <div class="space-y-2">
            <label class="text-xs font-medium text-slate-400">Effective Date</label>
            <input
              type="date"
              class="w-full bg-navy-800 border border-navy-700 rounded-lg p-2.5 text-sm text-slate-200 outline-none focus:border-blue-500"
            />
          </div>
          <button
            type="button"
            [disabled]="!canGenerate(role)"
            [title]="!canGenerate(role) ? 'Accès refusé' : undefined"
            class="w-full py-3 font-bold rounded-lg transition-all flex items-center justify-center gap-2"
            [ngClass]="
              canGenerate(role)
                ? 'bg-blue-600 hover:bg-blue-500 text-white shadow-lg shadow-blue-600/20'
                : 'bg-slate-700 text-slate-400 cursor-not-allowed shadow-none'
            "
          >
            <app-doc-icon name="edit" klass="w-4 h-4"></app-doc-icon>
            @if (canGenerate(role)) {
              Preview & Generate
            } @else {
              Accès refusé
            }
          </button>
        </div>
      </div>

      <div class="card-navy p-6 flex flex-col items-center justify-center text-center space-y-4 border-dashed border-2 border-navy-800">
        <div class="w-16 h-16 bg-navy-800 rounded-full flex items-center justify-center">
          <app-doc-icon name="eye" klass="w-8 h-8 text-slate-600"></app-doc-icon>
        </div>
        <div>
          <h4 class="text-slate-300 font-medium">Document Preview</h4>
          <p class="text-slate-500 text-sm max-w-xs mx-auto">
            Fill out the form to see a live preview of the generated document
          </p>
        </div>
      </div>
    </div>
  </div>
}
